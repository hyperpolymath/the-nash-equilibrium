# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Cerro Torre manifest for The Nash Equilibrium .ctp bundle
#
# This manifest describes the container image for verified
# container packaging. Used by `ct pack` to create .ctp bundles.

[metadata]
name = "the-nash-equilibrium"
version = "0.1.0"
revision = 1
summary = "6X strategy board game exploring economic systems, planetary boundaries, and post-scarcity futures"
description = """
The Nash Equilibrium — containerised service packaged as a verified
cerro-torre .ctp bundle with Ed25519 signing and full provenance
tracking.
"""
license = "AGPL-3.0-or-later"
homepage = "https://github.com/hyperpolymath/the-nash-equilibrium"
maintainer = "Jonathan D.A. Jewell <j.d.a.jewell@open.ac.uk>"

[provenance]
upstream = "https://github.com/hyperpolymath/the-nash-equilibrium"
import_date = 2026-04-04T00:00:00Z

[dependencies]
runtime = ["ca-certificates", "curl"]
build = []

[build]
system = "podman"

[build.environment]
APP_HOST = "[::]"
APP_PORT = "8080"

[outputs]
primary = "the-nash-equilibrium"
split = []

[attestations]
require = ["source-signature", "sbom-complete"]
recommend = ["security-audit", "reproducible-build"]

# Runtime security profile
[security]
user = "appuser"
group = "appuser"
read_only_root = false
no_new_privileges = true

[security.capabilities]
drop = ["ALL"]
add = ["NET_BIND_SERVICE"]

[security.network]
listen_tcp = [8080]

[security.filesystem]
read = ["/app/", "/data/"]
write = ["/data/", "/tmp/"]
execute = ["/app/entrypoint.sh"]
